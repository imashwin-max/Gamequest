<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GameQuest — Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#ffffff;--surface2:#f2f0ec;--border:#e4e1db;
  --text:#1a1814;--muted:#8a857e;--accent:#7c6cfc;--accent-bg:#f0eeff;
  --success:#22c55e;--success-bg:#f0fdf4;--success-text:#15803d;
  --warning:#f59e0b;--warning-bg:#fffbeb;--warning-text:#b45309;
  --danger:#ef4444;--danger-bg:#fef2f2;--danger-text:#b91c1c;
  --pro:#8b5cf6;--pro-bg:#f5f3ff;--pro-text:#6d28d9;
  --radius:10px;--shadow:0 1px 8px rgba(0,0,0,0.07);
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.wrapper{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.logo{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.reset-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.2s}
.reset-btn:hover{border-color:var(--danger);color:var(--danger)}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-val{font-size:28px;font-weight:600;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.xp-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.level-badge{display:inline-flex;align-items:center;gap:6px;background:var(--pro-bg);color:var(--pro-text);border-radius:99px;padding:5px 14px;font-size:13px;font-weight:600}
.xp-text{font-size:13px;color:var(--muted)}
.xp-bar-bg{background:var(--surface2);border-radius:99px;height:10px;overflow:hidden}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#a78bfa);transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)}
.add-row{display:flex;gap:8px;flex-wrap:wrap}
.add-input{flex:1;min-width:160px;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Space Grotesk',sans-serif;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.2s}
.add-input:focus{border-color:var(--accent)}
.add-input::placeholder{color:var(--muted)}
.diff-group{display:flex;gap:6px}
.diff-btn{padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.diff-btn.sel-easy{background:var(--success-bg);color:var(--success-text);border-color:var(--success)}
.diff-btn.sel-medium{background:var(--warning-bg);color:var(--warning-text);border-color:var(--warning)}
.diff-btn.sel-hard{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger)}
.add-submit{padding:9px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;white-space:nowrap}
.add-submit:hover{background:#6a5ce8}
.quests-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.quests-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.filter-group{display:flex;gap:6px}
.filter-btn{padding:5px 12px;border:1px solid var(--border);border-radius:99px;background:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
.filter-btn.on{background:var(--text);color:#fff;border-color:var(--text)}
.quest-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.quest-item:last-child{border-bottom:none}
.check-btn{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;color:#fff;font-size:14px}
.check-btn.done{background:var(--success);border-color:var(--success)}
.quest-info{flex:1;min-width:0}
.quest-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all 0.2s}
.quest-name.done{text-decoration:line-through;color:var(--muted);font-weight:400}
.quest-tags{display:flex;gap:6px;margin-top:3px;align-items:center}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
.tag-easy{background:var(--success-bg);color:var(--success-text)}
.tag-medium{background:var(--warning-bg);color:var(--warning-text)}
.tag-hard{background:var(--danger-bg);color:var(--danger-text)}
.xp-reward{font-size:11px;color:var(--muted)}
.streak-badge{font-size:11px;color:var(--accent);display:flex;align-items:center;gap:2px}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:16px;flex-shrink:0;opacity:0.4;transition:opacity 0.15s;display:flex;align-items:center}
.del-btn:hover{opacity:1;color:var(--danger)}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:0.4}
.badges-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:12px}
.badge-item{padding:12px 10px;border-radius:12px;text-align:center;border:1px solid var(--border);transition:all 0.2s}
.badge-item.earned{background:var(--pro-bg);border-color:#c4b5fd}
.badge-item.locked{background:var(--bg);opacity:0.55}
.badge-icon{font-size:22px;margin-bottom:5px;color:var(--pro)}
.badge-item.locked .badge-icon{color:var(--muted)}
.badge-name{font-size:12px;font-weight:600;color:var(--text)}
.badge-desc{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all 0.3s;pointer-events:none;z-index:999;max-width:260px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.level{background:var(--accent)}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr;}.stat-card:last-child{grid-column:span 2}
  .diff-group{flex-wrap:wrap}
  .add-row{flex-direction:column}
  .add-submit{width:100%}
}
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="logo">Game<span>Quest</span></div>
    <button class="reset-btn" onclick="confirmReset()">
      <i class="ti ti-refresh"></i> Reset Day
    </button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Level</div>
      <div class="stat-val" id="s-level">1</div>
      <div class="stat-sub" id="s-title">Explorer</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-val" id="s-streak">0</div>
      <div class="stat-sub">days in a row</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Completed</div>
      <div class="stat-val" id="s-done">0</div>
      <div class="stat-sub">all time</div>
    </div>
  </div>

  <div class="xp-card">
    <div class="xp-top">
      <div class="level-badge">
        <i class="ti ti-bolt"></i>
        <span id="xp-badge">Level 1 — Explorer</span>
      </div>
      <div class="xp-text" id="xp-text">0 / 100 XP</div>
    </div>
    <div class="xp-bar-bg">
      <div class="xp-bar-fill" id="xp-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="add-card">
    <div class="card-title"><i class="ti ti-plus"></i> Add a quest</div>
    <div class="add-row">
      <input class="add-input" id="quest-input" type="text" placeholder="e.g. Drink 8 glasses of water" maxlength="60" />
      <div class="diff-group">
        <button class="diff-btn sel-easy" id="d-easy" onclick="setDiff('easy')">Easy +10</button>
        <button class="diff-btn" id="d-medium" onclick="setDiff('medium')">Medium +25</button>
        <button class="diff-btn" id="d-hard" onclick="setDiff('hard')">Hard +50</button>
      </div>
      <button class="add-submit" onclick="addQuest()">Add Quest</button>
    </div>
  </div>

  <div class="quests-card">
    <div class="quests-header">
      <div class="card-title" style="margin:0"><i class="ti ti-list-check"></i> Today's quests</div>
      <div class="filter-group">
        <button class="filter-btn on" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
        <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
      </div>
    </div>
    <div id="quest-list"></div>
  </div>

  <div class="badges-card">
    <div class="card-title"><i class="ti ti-trophy"></i> Achievements</div>
    <div class="badges-grid" id="badges-grid"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const LEVELS = [
  {name:'Explorer',xp:100},{name:'Adventurer',xp:250},{name:'Champion',xp:500},
  {name:'Hero',xp:900},{name:'Legend',xp:1500},{name:'Mythic',xp:Infinity}
];
const XP = {easy:10,medium:25,hard:50};
const BADGES = [
  {id:'first',icon:'ti-trophy',name:'First Quest',desc:'Complete your first quest',check:s=>s.totalDone>=1},
  {id:'ten',icon:'ti-medal',name:'Dedicated',desc:'Complete 10 quests',check:s=>s.totalDone>=10},
  {id:'fifty',icon:'ti-crown',name:'Master',desc:'Complete 50 quests',check:s=>s.totalDone>=50},
  {id:'streak3',icon:'ti-flame',name:'On Fire',desc:'3-day streak',check:s=>s.streak>=3},
  {id:'streak7',icon:'ti-rocket',name:'Week Warrior',desc:'7-day streak',check:s=>s.streak>=7},
  {id:'streak30',icon:'ti-galaxy',name:'Unstoppable',desc:'30-day streak',check:s=>s.streak>=30},
  {id:'hard1',icon:'ti-sword',name:'Hard Mode',desc:'Complete a hard quest',check:s=>s.hardDone>=1},
  {id:'hard10',icon:'ti-shield',name:'Warrior',desc:'Complete 10 hard quests',check:s=>s.hardDone>=10},
  {id:'xp100',icon:'ti-bolt',name:'XP Farmer',desc:'Earn 100 XP total',check:s=>s.totalXP>=100},
  {id:'xp500',icon:'ti-star',name:'XP Hunter',desc:'Earn 500 XP total',check:s=>s.totalXP>=500},
  {id:'xp2000',icon:'ti-diamond',name:'XP Legend',desc:'Earn 2000 XP total',check:s=>s.totalXP>=2000},
  {id:'early',icon:'ti-sun',name:'Early Bird',desc:'Add 5+ quests',check:s=>s.quests.length>=5},
];

let state = loadState();
let selDiff = 'easy';
let selFilter = 'all';

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('gamequest_v2'));
    if (s) return s;
  } catch(e) {}
  return {
    xp:0, totalXP:0, streak:0, lastDate:null,
    totalDone:0, hardDone:0,
    quests:[
      {id:1,name:'Drink 8 glasses of water',diff:'easy',done:false,streak:0},
      {id:2,name:'Exercise for 30 minutes',diff:'medium',done:false,streak:0},
      {id:3,name:'Read for 20 minutes',diff:'easy',done:false,streak:0},
      {id:4,name:'No social media for 2 hours',diff:'hard',done:false,streak:0},
    ]
  };
}

function saveState() {
  localStorage.setItem('gamequest_v2', JSON.stringify(state));
}

function getLevelInfo(xp) {
  let cum = 0;
  for (let i = 0; i < LEVELS.length; i++) {
    const needed = LEVELS[i].xp;
    if (xp < cum + needed || i === LEVELS.length - 1) {
      return {
        level: i + 1,
        name: LEVELS[i].name,
        cur: xp - cum,
        needed: needed === Infinity ? 9999 : needed,
        pct: needed === Infinity ? 99 : Math.min(100, Math.round((xp - cum) / needed * 100))
      };
    }
    cum += needed;
  }
}

function render() {
  const info = getLevelInfo(state.xp);
  document.getElementById('s-level').textContent = info.level;
  document.getElementById('s-title').textContent = info.name;
  document.getElementById('s-streak').textContent = state.streak;
  document.getElementById('s-done').textContent = state.totalDone;
  document.getElementById('xp-badge').textContent = `Level ${info.level} — ${info.name}`;
  document.getElementById('xp-text').textContent = `${info.cur} / ${info.needed} XP`;
  document.getElementById('xp-fill').style.width = info.pct + '%';

  const filtered = state.quests.filter(q =>
    selFilter === 'all' ||
    (selFilter === 'done' && q.done) ||
    (selFilter === 'active' && !q.done)
  );

  const list = document.getElementById('quest-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon"><i class="ti ti-mood-smile"></i></div>
      ${selFilter === 'done' ? 'No completed quests yet — get going!' : 'No active quests. Add one above!'}
    </div>`;
  } else {
    list.innerHTML = filtered.map(q => `
      <div class="quest-item">
        <button class="check-btn${q.done ? ' done' : ''}" onclick="toggleQuest(${q.id})" aria-label="${q.done ? 'Undo' : 'Complete'}">
          ${q.done ? '<i class="ti ti-check"></i>' : ''}
        </button>
        <div class="quest-info">
          <div class="quest-name${q.done ? ' done' : ''}">${q.name}</div>
          <div class="quest-tags">
            <span class="tag tag-${q.diff}">${q.diff}</span>
            <span class="xp-reward">+${XP[q.diff]} XP</span>
            ${q.streak > 0 ? `<span class="streak-badge"><i class="ti ti-flame" style="font-size:11px"></i>${q.streak}d</span>` : ''}
          </div>
        </div>
        <button class="del-btn" onclick="deleteQuest(${q.id})" aria-label="Delete">
          <i class="ti ti-trash"></i>
        </button>
      </div>
    `).join('');
  }

  document.getElementById('badges-grid').innerHTML = BADGES.map(b => {
    const earned = b.check(state);
    return `<div class="badge-item ${earned ? 'earned' : 'locked'}">
      <div class="badge-icon"><i class="ti ${b.icon}"></i></div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${b.desc}</div>
    </div>`;
  }).join('');
}

function setDiff(d) {
  selDiff = d;
  ['easy','medium','hard'].forEach(x => {
    document.getElementById('d-' + x).className = 'diff-btn' + (x === d ? ' sel-' + x : '');
  });
}

function addQuest() {
  const input = document.getElementById('quest-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  state.quests.push({id: Date.now(), name, diff: selDiff, done: false, streak: 0});
  input.value = '';
  saveState(); render();
  showToast('Quest added! Go crush it.');
}

function toggleQuest(id) {
  const q = state.quests.find(x => x.id === id);
  if (!q) return;
  if (!q.done) {
    q.done = true;
    const gain = XP[q.diff];
    const oldLevel = getLevelInfo(state.xp).level;
    state.xp += gain;
    state.totalXP += gain;
    state.totalDone++;
    if (q.diff === 'hard') state.hardDone = (state.hardDone || 0) + 1;
    const today = new Date().toDateString();
    if (state.lastDate !== today) {
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      state.streak = state.lastDate === yesterday ? state.streak + 1 : 1;
      state.lastDate = today;
    }
    const newLevel = getLevelInfo(state.xp).level;
    if (newLevel > oldLevel) {
      showToast(`Level up! You're now Level ${newLevel} — ${getLevelInfo(state.xp).name}`, true);
    } else {
      showToast(`+${gain} XP earned! Keep going.`);
    }
  } else {
    q.done = false;
    state.xp = Math.max(0, state.xp - XP[q.diff]);
    state.totalDone = Math.max(0, state.totalDone - 1);
    showToast('Quest undone.');
  }
  saveState(); render();
}

function deleteQuest(id) {
  if (!confirm('Delete this quest?')) return;
  state.quests = state.quests.filter(x => x.id !== id);
  saveState(); render();
}

function setFilter(f, btn) {
  selFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function confirmReset() {
  if (!confirm('Reset today\'s quests? (XP and stats are kept)')) return;
  state.quests.forEach(q => q.done = false);
  saveState(); render();
  showToast('Day reset! New quests await.');
}

document.getElementById('quest-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addQuest();
});

let toastTimer;
function showToast(msg, isLevel = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isLevel ? ' level' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

render();
</script>
</body>
</html>
